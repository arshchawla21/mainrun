version: '3'

tasks:
  checkpoint:
    dir: scripts
    cmds:
      - npx zx checkpoint.mjs

  download:
    dir: mainrun
    cmds:
      - python3 download_dataset.py

  train:
    deps: [checkpoint, download]
    dir: mainrun
    cmds:
      - python3 train.py

  # unified benchmark engine; pick the experiment from experiments.py
  #   task bench -- run size      |    task bench -- plot size
  bench:
    deps: [download]
    dir: mainrun
    cmds:
      - python3 bench.py {{.CLI_ARGS}}

  submit:
    deps: [checkpoint]
    dir: scripts
    cmds:
      - npx zx submit.mjs
    